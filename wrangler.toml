name = "fallacychecker"
compatibility_date = "2026-06-11"
compatibility_flags = ["nodejs_compat"]

# Output directory produced by @sveltejs/adapter-cloudflare
pages_build_output_dir = ".svelte-kit/cloudflare"

# ---------------------------------------------------------------------
# Plain-text environment variables.
# These are safe to commit — for secrets (Supabase service role key,
# PRIVATE_API_KEY, etc.) use the Cloudflare dashboard
# (Pages project -> Settings -> Environment variables -> Encrypt)
# or `wrangler pages secret put <NAME>`.
# ---------------------------------------------------------------------
[vars]
PUBLIC_APP_NAME = "FallacyX"
PUBLIC_BRAND_NAME = "Revonalar"
PUBLIC_ENVIRONMENT = "production"
PUBLIC_APP_URL = "https://fallacyx.pages.dev"
PUBLIC_API_URL_CLIENT = "https://api.fallacychecker.revonalar.com"
PUBLIC_SUPABASE_URL = "https://bfhjknbboxhsxbwnmjov.supabase.co"
PUBLIC_SUPABASE_ANON_KEY="sb_publishable_jOVwFFkTWSeJ48kjcOBJRA_yPmsOy5f"


# ---------------------------------------------------------------------
# Preview deployments (e.g. PRs / non-main branches) get their own vars.
# ---------------------------------------------------------------------
[env.preview.vars]
PUBLIC_ENVIRONMENT = "staging"
PUBLIC_APP_URL = "https://preview.fallacychecker.revonalar.com"
PUBLIC_API_URL_CLIENT = "https://api-staging.fallacychecker.revonalar.com"
