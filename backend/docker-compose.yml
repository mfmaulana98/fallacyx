version: "3.9"

# =============================================================================
# FallacyX — Inference & API Stack (AMD Developer Cloud, MI300X / ROCm)
# =============================================================================
# Run with:
#   docker-compose up -d
#
# Stop with:
#   docker-compose down
#
# Tail logs:
#   docker-compose logs -f
#
# Notes on MI300X/ROCm:
#   - GPU access on ROCm hosts is exposed via /dev/kfd and /dev/dri device
#     nodes plus the `video` and `render` groups, NOT via nvidia-docker.
#   - Both vllm and whisper need GPU access, so both mount the same devices.
#     ROCm allows multiple processes on one GPU; tune memory fractions if
#     they contend for VRAM.
# =============================================================================

x-rocm-gpu: &rocm-gpu
  devices:
    - /dev/kfd:/dev/kfd
    - /dev/dri:/dev/dri
  group_add:
    - video
    - render
  security_opt:
    - seccomp=unconfined
  ipc: host
  shm_size: "16g"

services:
  # ---------------------------------------------------------------------------
  # vLLM — OpenAI-compatible inference server (Llama-3-70B / Qwen-72B) on MI300X
  # ---------------------------------------------------------------------------
  vllm:
    image: rocm/vllm-dev:vllm-openai
    container_name: fallacyx-vllm
    restart: unless-stopped
    <<: *rocm-gpu
    ports:
      - "8000:8000"
    volumes:
      - ./models:/models
    environment:
      - HIP_VISIBLE_DEVICES=0
      - HSA_OVERRIDE_GFX_VERSION=9.4.2
    command: >
      --model /models/llama-3-70b
      --served-model-name llama-3-70b
      --tensor-parallel-size 1
      --max-model-len 8192
      --gpu-memory-utilization 0.85
      --host 0.0.0.0
      --port 8000
    deploy:
      resources:
        limits:
          memory: 256g
        reservations:
          memory: 128g
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 600s # 70B model load can take a while
    networks:
      - fallacyx-net

  # ---------------------------------------------------------------------------
  # Whisper — speech-to-text (faster-whisper, large-v3) for audio/video input
  # ---------------------------------------------------------------------------
  whisper:
    build:
      context: ./docker/whisper
      dockerfile: Dockerfile
    container_name: fallacyx-whisper
    restart: unless-stopped
    <<: *rocm-gpu
    ports:
      - "8001:8001"
    volumes:
      - ./models/whisper:/models/whisper
    environment:
      - WHISPER_MODEL=large-v3
      - WHISPER_DEVICE=cuda # ROCm exposes itself via the CUDA-compatible HIP shim
      - WHISPER_COMPUTE_TYPE=float16
      - HIP_VISIBLE_DEVICES=0
      - HSA_OVERRIDE_GFX_VERSION=9.4.2
    deploy:
      resources:
        limits:
          memory: 32g
        reservations:
          memory: 8g
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    networks:
      - fallacyx-net

  # ---------------------------------------------------------------------------
  # Qdrant — vector database for RAG (fallacy examples, precedent retrieval)
  # ---------------------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:latest
    container_name: fallacyx-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333" # REST API
      - "6334:6334" # gRPC API
    volumes:
      - ./qdrant_storage:/qdrant/storage
    deploy:
      resources:
        limits:
          memory: 8g
        reservations:
          memory: 2g
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'cat < /dev/null > /dev/tcp/localhost/6333'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - fallacyx-net

  # ---------------------------------------------------------------------------
  # Redis — caching layer for analysis results
  # ---------------------------------------------------------------------------
  redis:
    image: redis:alpine
    container_name: fallacyx-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ./redis_data:/data
    command: redis-server --save 60 1 --loglevel warning
    deploy:
      resources:
        limits:
          memory: 2g
        reservations:
          memory: 512m
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - fallacyx-net

  # ---------------------------------------------------------------------------
  # API — FastAPI backend (orchestrates vllm, whisper, qdrant, redis)
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fallacyx-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - VLLM_BASE_URL=http://vllm:8000/v1
      - VLLM_MODEL_NAME=llama-3-70b
      - WHISPER_BASE_URL=http://whisper:8001
      - QDRANT_URL=http://qdrant:6333
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      vllm:
        condition: service_healthy
      whisper:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 4g
        reservations:
          memory: 1g
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - fallacyx-net

  # ---------------------------------------------------------------------------
  # Nginx — reverse proxy / TLS termination in front of the API
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: fallacyx-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - api
    deploy:
      resources:
        limits:
          memory: 256m
        reservations:
          memory: 64m
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/healthz"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - fallacyx-net

networks:
  fallacyx-net:
    driver: bridge
