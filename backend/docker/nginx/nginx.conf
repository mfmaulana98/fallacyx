# =============================================================================
# FallacyX — Nginx reverse proxy in front of the FastAPI backend
# =============================================================================

upstream fallacyx_api {
    server api:8080;
}

server {
    listen 80;
    server_name _;

    # Health check endpoint for the nginx healthcheck itself
    location /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Uncomment to redirect all HTTP traffic to HTTPS once certs are in place
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass http://fallacyx_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long-lived connections for streaming responses (SSE / chunked LLM output)
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}

